### Variables
$mod = SUPER
$left = h
$down = j
$up = k
$right = l

$term = ghostty
$menu = fuzzel
$wallpapers_path = $HOME/.config/sway/wallpapers
$lockscreen_wallpapers_path = $HOME/.config/sway/lockscreen_wallpapers

### Monitors
# Structure: monitor=name,resolution@refresh,position,scale
monitor = Unknown GFV22CB, 1920x1080@120, 0x0, 1, vrr, 1
# Unused/Disabled monitors configurations can be placed here:
# monitor = HDMI-A-1, disable

# Multi-monitor script execution
bind = $mod SHIFT, Escape, exec, $HOME/.config/sway/scripts/output.sh

### Environment Variables & Portals (Equivalent to dbus-update-activation-environment)
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

### Input Configuration
input {
    # Keyboard layouts
    kb_layout = us,us,ru,gr
    kb_variant = intl,altgr-intl,,
    kb_options = grp:alt_shift_toggle
    
    # Mouse / Cursor behavior
    follow_mouse = 1
    cursor_inactive_timeout = 10  # Hides mouse after 10 seconds

    touchpad {
        disable_while_typing = true
        tap-to-click = true
        natural_scroll = true
        middle_button_emulation = true
        scroll_factor = 0.3
    }
}

### Look and Feel (Gaps & Borders)
general {
    gaps_in = 4
    gaps_out = 4
    border_size = 2
    
    # Sway window colors fallback (Focused: #64727d, Unfocused: #2e3440)
    col.active_border = rgb(64727d)
    col.inactive_border = rgb(2e3440)

    layout = dwindle # Switch to 'master' if you prefer a main stack layout
}

# If you want to keep Hyprland completely flat like Sway, uncomment the lines below:
# decoration {
#     drop_shadow = false
#     blur {
#         enabled = false
#     }
# }

### GTK Settings & Themes (Executed on startup)
exec-once = gsettings set org.gnome.desktop.wm.preferences theme Adwaita-One-Dark
exec-once = gsettings set org.gnome.desktop.interface font-name "Arimo Nerd Font"
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Adwaita-One-Dark
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec-once = gsettings set org.gnome.desktop.interface icon-theme Adwaita

### Global Execs & Daemons
exec-once = gammastep
exec-once = swaync
exec-once = waybar        # Launches your bar configuration automatically

# Clipman Background Clipboard Store
exec-once = wl-paste -t text --watch clipman store
exec-once = wl-paste -p -t text --watch clipman store -P --histpath="~/.local/share/clipman-primary.json"

# Core Apps & Random Wallpaper
exec-once = firefox
exec-once = spotify-launcher
exec-once = hyprctl hyprpaper || hyprpaper & # Optional native alternative, or stick to your shell execution:
exec-once = hyprctl dispatch output "*" bg `find $wallpapers_path -type f | shuf -n 1`

### Window Rules & Workspace Assignments (windowrulev2)

# Floating setups
windowrulev2 = float, class:^(com.mitchellh.float_term)$
windowrulev2 = float, title:^(Sway recorder)$
windowrulev2 = float, class:^(floating)$

# Default dialog and menu popups rules replacements
windowrulev2 = float, title:^(pop-up)$
windowrulev2 = float, title:^(bubble)$
windowrulev2 = float, title:^(dialog)$
windowrulev2 = float, title:^(task_dialog)$
windowrulev2 = float, title:^(menu)$

# Statistical / Math tools window sizing rules
windowrulev2 = float, class:^(Matplotlib)$, title:^(Figure .*)$
windowrulev2 = size 380 300, class:^(Matplotlib)$, title:^(Figure .*)$
windowrulev2 = exec $HOME/.config/sway/scripts/toprightfloat.sh, class:^(Matplotlib)$, title:^(Figure .*)$

windowrulev2 = float, class:^(R_x11)$, title:^(r_x11)$
windowrulev2 = size 380 300, class:^(R_x11)$, title:^(r_x11)$
windowrulev2 = exec $HOME/.config/sway/scripts/toprightfloat.sh, class:^(R_x11)$, title:^(r_x11)$

# Inhibit Idle when full screen (Sway style)
windowrulev2 = idleinhibit fullscreen, class:^(.*)$

# App-to-workspace pinning rules
windowrulev2 = workspace 1, class:^(Spotify)$
windowrulev2 = workspace 1, initialClass:^(spotify)$
windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 6, class:^(com.bitwig.BitwigStudio)$
windowrulev2 = workspace 8, class:^(discord)$
windowrulev2 = workspace 8, class:^(vesktop)$
windowrulev2 = workspace 9, class:^(steam)$
windowrulev2 = workspace 10, class:^(org.libretro.RetroArch)$
windowrulev2 = workspace 10, class:^(AppRun.wrapped)$

# Explicitly assign workspace 7 to your secondary monitor port if active
workspace = 7, monitor:HDMI-A-1

### Key Bindings

# Terminal, Launcher & Control Center
bind = $mod, Return, exec, $term
bind = $mod SHIFT, Return, exec, ghostty --class=com.mitchellh.float_term
bind = $mod SHIFT, q, killactive, 
bind = $mod, d, exec, $menu
bind = $mod SHIFT, c, exec, hyprctl reload
bind = $mod SHIFT, n, exec, swaync-client -t -sw

# Custom Exit Dialog Safeguard
bind = $mod SHIFT, e, exec, hyprctl dispatch exit

# Window Layout Management
bind = $mod, b, togglesplit, # Dwindle toggle split orientation split direction
bind = $mod, f, fullscreen, 0
bind = $mod SHIFT, space, togglefloating, 
bind = $mod, a, focuscurrentorlast, # Focus parent logic maps closest to back-and-forth/last

# Scratchpad functionality
bind = $mod SHIFT, minus, movetoworkspace, special
bind = $mod, minus, togglespecialworkspace,

# Clipboard Picker
bind = $mod, c, exec, clipman pick --tool=CUSTOM --tool-args="fuzzel -d -w 70"

# Screenshots
bind = $mod, p, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod SHIFT, p, exec, grim -g "$(slurp)" - | swappy -f -

# Swayrecorder script toggle
bind = $mod, x, exec, $HOME/.config/sway/scripts/toggleSwayRecorder.sh

# Media Keys (`l` means it runs even when the session screen is locked)
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Volume control with constraints limit
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- -l 1.2
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1.2

# Brightness keys
bindl = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Directional focus movement (Vim bindings)
bind = $mod, $left, movefocus, l
bind = $mod, $down, movefocus, d
bind = $mod, $up, movefocus, u
bind = $mod, $right, movefocus, r

# Directional focus movement (Arrow keys)
bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

# Move window position (Vim bindings)
bind = $mod SHIFT, $left, movewindow, l
bind = $mod SHIFT, $down, movewindow, d
bind = $mod SHIFT, $up, movewindow, u
bind = $mod SHIFT, $right, movewindow, r

# Move window position (Arrow keys)
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# Switch to workspace via $mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move container to workspace via $mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Workspace Alt+Tab back and forth
bind = MOD1, Tab, workspace, previous

# Mouse operations: Drag/Resize windows (`m` flag for mouse)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

### Window Resize Submode
bind = $mod, r, submap, resize
submap = resize

binde = , $left, resizeactive, -10 0
binde = , $down, resizeactive, 0 10
binde = , $up, resizeactive, 0 -10
binde = , $right, resizeactive, 10 0

binde = , Left, resizeactive, -10 0
binde = , Down, resizeactive, 0 10
binde = , Up, resizeactive, 0 -10
binde = , Right, resizeactive, 10 0

bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

### Idle & Lockscreen Daemon Calls
# (Note: hypridle is the modern drop-in replacement for swayidle if you choose to migrate tools)
exec-once = swayidle -w \
    timeout 720 'swaylock -f -e -i ~/.config/sway/lockscreen_wallpapers/grotesqueimpalement.jpg' \
    timeout 1500 'systemctl suspend' \
    resume 'hyprctl dispatch dpms on' \
    before-sleep 'playerctl pause && swaylock -f -e -i ~/.config/sway/lockscreen_wallpapers/grotesqueimpalement.jpg'

# Hardware lid close lock-switch mechanism
bindl = , switch:on:Lid Status, exec, swaylock -f -e -i ~/.config/sway/grotesqueimpalement.jpg
